<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your Image | Nazrul Private Tools</title>
    
    <meta name="robots" content="noindex, nofollow" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Hind+Siliguri:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body class="py-10 px-4 flex flex-col justify-center items-center">

    <div class="max-w-4xl w-full">
        <div class="glass-card rounded-[2.5rem] overflow-hidden">
            
            <div class="p-8 md:p-12 text-center bg-gradient-to-b from-green-50/50 to-transparent">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 text-green-600 rounded-full mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">আপনার ইমেজ রেডি!</h1>
                <p class="text-slate-500 font-medium">CEO: NAZRUL ISLAM | WhatsApp: 01316487435</p>
            </div>

            <div class="p-8 md:p-12 pt-0">
                <div class="grid grid-cols-2 gap-6 mb-10">
                    <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 text-center">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">পূর্বের সাইজ</p>
                        <p class="text-3xl font-black text-slate-700"><span id="oldSize">-</span> <span class="text-lg">KB</span></p>
                    </div>
                    <div class="p-6 bg-green-50 rounded-3xl border border-green-100 text-center ring-4 ring-green-100/50">
                        <p class="text-sm font-bold text-green-500 uppercase tracking-widest mb-1">নতুন সাইজ</p>
                        <p class="text-3xl font-black text-green-600"><span id="newSize">-</span> <span class="text-lg">KB</span></p>
                    </div>
                </div>

                <div class="relative group mb-8">
                    <img id="finalImg" class="relative w-full rounded-[2rem] border-4 border-white shadow-2xl mx-auto max-h-96 object-contain bg-white">
                </div>

                <div class="space-y-4">
                    <button id="dlLink" class="download-btn w-full text-white text-xl font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        ফাইলটি ডাউনলোড করুন
                    </button>
                    
                    <a href="index.html" class="flex items-center justify-center gap-2 text-slate-500 hover:text-blue-600 font-bold transition-colors py-2">
                        ← আরেকটি ছবি প্রসেস করুন
                    </a>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-slate-400 text-xs tracking-widest uppercase pb-10">
            © 2026 Nazrul Private Tools
        </footer>
    </div>

    <script>
        window.onload = () => {
            const imgData = localStorage.getItem('compressedImg');
            if(!imgData) { window.location.href = 'index.html'; return; }

            document.getElementById('oldSize').innerText = localStorage.getItem('oldSize');
            document.getElementById('newSize').innerText = localStorage.getItem('newSize');
            document.getElementById('finalImg').src = imgData;

            document.getElementById('dlLink').onclick = () => {
                const link = document.createElement('a');
                link.href = imgData;
                link.download = "compressed_" + (localStorage.getItem('imgName') || "image.png");
                link.click();
            };
        };
    </script>
</body>
</html>
