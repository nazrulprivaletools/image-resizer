<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Image Resizer | Private Tool</title>
    
    <meta name="robots" content="noindex, nofollow" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
        .gradient-text {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-input:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .btn-glow:hover {
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col justify-center items-center">
    <div class="max-w-2xl w-full premium-card p-8 md:p-12 rounded-[2.5rem] relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-black gradient-text mb-3">Image Resizer</h1>
            <p class="text-slate-500 font-medium text-sm">CEO: NAZRUL ISLAM | WhatsApp: 01316487435</p>
        </div>

        <div class="bg-blue-600 p-6 rounded-3xl mb-8 text-white shadow-lg shadow-blue-100">
            <h3 class="font-bold mb-3 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                Quick Steps:
            </h3>
            <ul class="space-y-2 text-blue-50 text-sm">
                <li>1. Select your image file.</li>
                <li>2. Check current file size.</li>
                <li>3. Set target size in KB (Optional).</li>
                <li>4. Click 'Resize Now'.</li>
            </ul>
        </div>

        <div class="relative group mb-6">
            <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div class="border-2 border-dashed border-blue-200 group-hover:border-blue-500 bg-blue-50/50 p-8 rounded-[2rem] text-center transition-all">
                <div class="bg-white w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </div>
                <p class="text-blue-600 font-bold">Select Image to Resize</p>
            </div>
        </div>

        <div id="infoArea" class="hidden space-y-6">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 flex justify-between items-center">
                <div class="overflow-hidden pr-4">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">File Name</p>
                    <p id="fileName" class="font-bold text-slate-700 truncate">-</p>
                </div>
                <div class="text-right whitespace-nowrap">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Current Size</p>
                    <p id="fileSize" class="font-bold text-red-500">-</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block font-bold text-slate-700 ml-1">Target Size (KB)</label>
                <div class="relative">
                    <input type="number" id="targetSize" placeholder="Example: 200" class="custom-input w-full p-5 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold">
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-300">KB</span>
                </div>
            </div>
            
            <button id="resizeBtn" class="btn-glow w-full bg-blue-600 text-white font-black text-xl py-5 rounded-2xl shadow-xl transition-all duration-300">Resize Now</button>
        </div>

    </div>

    <footer class="mt-8 text-center text-slate-400 text-xs tracking-widest uppercase pb-10">
        © 2026 Nazrul Private Tools
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const infoArea = document.getElementById('infoArea');
        let selectedFile;

        imageInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('fileSize').innerText = (selectedFile.size / 1024).toFixed(2) + " KB";
                infoArea.classList.remove('hidden');
                infoArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });

        document.getElementById('resizeBtn').onclick = async () => {
            const targetKB = document.getElementById('targetSize').value;
            const options = {
                maxSizeMB: targetKB ? targetKB / 1024 : selectedFile.size / (1024 * 1024 * 1.5),
                maxWidthOrHeight: 1920,
                useWebWorker: true
            };

            try {
                document.getElementById('resizeBtn').innerHTML = `Processing...`;
                document.getElementById('resizeBtn').disabled = true;

                const compressedFile = await imageCompression(selectedFile, options);
                const reader = new FileReader();
                reader.readAsDataURL(compressedFile);
                reader.onloadend = () => {
                    localStorage.setItem('compressedImg', reader.result);
                    localStorage.setItem('oldSize', (selectedFile.size / 1024).toFixed(2));
                    localStorage.setItem('newSize', (compressedFile.size / 1024).toFixed(2));
                    localStorage.setItem('imgName', selectedFile.name);
                    
                    location.assign("download.html");
                };
            } catch (err) { 
                alert('Resize failed!'); 
                document.getElementById('resizeBtn').innerText = "Resize Now";
                document.getElementById('resizeBtn').disabled = false;
            }
        };
    </script>
</body>
</html>
